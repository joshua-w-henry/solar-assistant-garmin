name: Static checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check for local configuration and obvious secrets
        run: ./scripts/check-secrets.sh

      - name: Validate XML resources
        run: |
          xmllint --noout \
            manifest.xml \
            resources/complications.xml \
            resources/drawables/drawables.xml \
            resources/strings/strings.xml
